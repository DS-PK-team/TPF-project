<!-- Login / Register -->
<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Login - Vault &amp; Vellum</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <style>
        /* Minimal custom CSS, mostly relying on Tailwind */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#794602",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#ffdcbd",
                        "primary-fixed-dim": "#81d1f0",
                        "on-primary-container": "#d3f1ff",
                        "on-primary-fixed-variant": "#004d62",
                        "on-primary-fixed": "#001f29",
                        "on-surface": "#191c1e",
                        "outline": "#6f787d",
                        "on-tertiary-fixed": "#2c1600",
                        "surface-container": "#eceef0",
                        "on-surface-variant": "#3f484c",
                        "surface-tint": "#006781",
                        "tertiary-container": "#965e1c",
                        "on-secondary-fixed-variant": "#38485d",
                        "outline-variant": "#bec8cd",
                        "secondary-fixed-dim": "#b7c8e1",
                        "secondary-container": "#d0e1fb",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container-highest": "#e0e3e5",
                        "on-tertiary-fixed-variant": "#693c00",
                        "surface-variant": "#e0e3e5",
                        "on-tertiary-container": "#ffe8d6",
                        "primary": "#005a71",
                        "on-secondary": "#ffffff",
                        "secondary": "#505f76",
                        "primary-fixed": "#b9eaff",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "on-background": "#191c1e",
                        "inverse-surface": "#2d3133",
                        "on-secondary-fixed": "#0b1c30",
                        "primary-container": "#0e7490",
                        "inverse-primary": "#81d1f0",
                        "tertiary-fixed-dim": "#ffb86f",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "background": "#f7f9fb",
                        "surface-container-high": "#e6e8ea",
                        "secondary-fixed": "#d3e4fe",
                        "surface": "#f7f9fb",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f2f4f6",
                        "surface-dim": "#d8dadc",
                        "surface-bright": "#f7f9fb",
                        "on-secondary-container": "#54647a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "xl": "40px",
                        "xs": "4px",
                        "sm": "8px",
                        "md": "16px",
                        "unit": "4px",
                        "container-max": "1280px",
                        "gutter": "20px"
                    },
                    "fontFamily": {
                        "headline-md": ["Manrope", "sans-serif"],
                        "headline-sm": ["Manrope", "sans-serif"],
                        "label-sm": ["Inter", "sans-serif"],
                        "body-lg": ["Inter", "sans-serif"],
                        "headline-lg": ["Manrope", "sans-serif"],
                        "body-md": ["Inter", "sans-serif"],
                        "label-md": ["Inter", "sans-serif"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-sm": ["18px", { "lineHeight": "26px", "fontWeight": "600" }],
                        "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg": ["30px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-background min-h-screen flex items-center justify-center p-md font-body-md text-body-md text-on-surface antialiased">
    <!-- 
        Navigation Shell Suppressed:
        As per the "Shell Visibility & Relevance" rule, this is a Linear/Transactional 
        screen (Login), so TopNavBar and SideNavBar are explicitly hidden to maintain focus.
    -->
    <main
        class="w-full max-w-[420px] bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.03)] border border-outline-variant/40 p-xl flex flex-col gap-xl">
        <!-- Header / Brand -->
        <header class="flex flex-col items-center gap-sm">
            <div class="w-12 h-12 bg-primary-fixed rounded-xl flex items-center justify-center text-primary mb-xs">
                <span class="material-symbols-outlined" data-weight="fill" style="font-size: 28px;">inventory_2</span>
            </div>
            <h1 class="font-headline-lg text-headline-lg text-on-surface text-center">Vault &amp; Vellum</h1>
            <p class="font-body-md text-body-md text-on-surface-variant text-center">Secure digital permanence.</p>
        </header>
        <!-- Login Form -->
        <form action="#" class="flex flex-col gap-lg" method="POST">
            <div class="flex flex-col gap-md">
                <!-- Email Field -->
                <div class="flex flex-col gap-xs">
                    <label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
                    <input
                        class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-[10px] font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors placeholder:text-outline"
                        id="email" name="email" placeholder="archivist@example.com" required="" type="email">
                </div>
                <!-- Password Field -->
                <div class="flex flex-col gap-xs">
                    <div class="flex justify-between items-end">
                        <label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
                        <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors"
                            href="#">Forgot password?</a>
                    </div>
                    <input
                        class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-[10px] font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors placeholder:text-outline"
                        id="password" name="password" placeholder="••••••••" required="" type="password">
                </div>
            </div>
            <!-- Actions -->
            <div class="flex flex-col gap-md pt-sm">
                <button
                    class="w-full bg-primary text-on-primary font-label-md text-label-md py-[12px] px-md rounded-lg hover:bg-primary-container transition-colors flex items-center justify-center gap-sm"
                    type="submit">
                    Sign In
                    <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
                </button>
            </div>
        </form>
        <!-- Footer Switch -->
        <footer class="text-center pt-md border-t border-surface-variant">
            <p class="font-body-md text-body-md text-on-surface-variant">
                New to the vault?
                <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors ml-xs"
                    href="#">Create an account</a>
            </p>
        </footer>
    </main>
</body>

</html>

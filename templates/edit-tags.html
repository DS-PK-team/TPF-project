            <div>

        <button

        <nav class="flex-1 space-y-1">

                Upload
            </a>
            <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface transition-all font-label-md text-label-md group"

                <span class="material-symbols-outlined text-outline group-hover:text-on-surface transition-colors"

                    data-icon="settings">settings</span>

                class="flex items-center gap-3 px-3 py-2 w-full rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface transition-all font-label-md text-label-md group">

                <button class="text-on-surface-variant hover:text-on-surface active:scale-95 duration-150">

                <button class="text-on-surface-variant hover:text-on-surface active:scale-95 duration-150">

                <h2 class="font-headline-lg text-headline-lg text-on-surface">Edit Destination</h2>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-lg lg:gap-xl">

                                    <div

                                        <div
                                            class="w-2.5 h-2.5 rounded-full bg-primary scale-0 peer-checked:scale-100 transition-transform">
                                        </div>
                                    </div>
                                    <div class="flex-1">

                    <div class="mt-auto flex justify-end gap-3 pt-4 border-t border-outline-variant/30">

<body class="bg-background text-on-background flex h-screen overflow-hidden antialiased">
    <nav
        class="h-screen w-64 border-r rounded-none border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-[4px_0_12px_rgba(0,0,0,0.03)] flex flex-col p-4 gap-2 z-50 shrink-0 hidden md:flex font-['Manrope'] text-sm font-semibold">

            <div class="w-10 h-10 rounded-lg bg-cyan-700 flex items-center justify-center shrink-0">

                    style="font-variation-settings: 'FILL' 1;">assured_workload</span>
            </div>
            <div class="flex flex-col">
                <span class="text-lg font-black text-slate-900 dark:text-white leading-tight">Document Vault</span>
                <span class="text-xs font-medium text-slate-500 dark:text-slate-400">Secure Storage</span>
            </div>
        </div>
        <button
            class="w-full bg-cyan-700 text-white rounded-lg py-2.5 px-4 mb-4 flex items-center justify-center gap-2 text-sm font-semibold hover:bg-cyan-800 transition-all active:opacity-80">

                Archive
            </a>
            <a class="bg-cyan-50 dark:bg-cyan-900/20 text-cyan-700 dark:text-cyan-400 rounded-lg flex items-center gap-3 px-3 py-2.5 transition-all active:opacity-80"
                href="#">
                <span class="material-symbols-outlined">upload_file</span>
                Upload
            </a>
            <a class="text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 hover:bg-slate-50 dark:hover:bg-slate-800/50 rounded-lg flex items-center gap-3 px-3 py-2.5 transition-all active:opacity-80"
                href="#">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">group</span>
                Shared
            </a>
        </div>
        <div class="flex flex-col gap-1 pt-4 border-t border-slate-100 dark:border-slate-800">
            <a class="text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 hover:bg-slate-50 dark:hover:bg-slate-800/50 rounded-lg flex items-center gap-3 px-3 py-2.5 transition-all active:opacity-80"
                href="#">
                <span class="material-symbols-outlined">settings</span>
                Settings

            <a class="text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 hover:bg-slate-50 dark:hover:bg-slate-800/50 rounded-lg flex items-center gap-3 px-3 py-2.5 transition-all active:opacity-80"
                href="#">
                <span class="material-symbols-outlined">logout</span>
                Log Out
            </a>
            <div class="mt-4 px-3 flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-green-500"></div>
                <span class="text-[11px] font-semibold text-slate-500 dark:text-slate-400">All files synced</span>

        <header
            class="flex justify-between items-center px-6 py-3 w-full sticky top-0 z-40 bg-surface-container-lowest border-b border-surface-dim flat no shadows active:scale-95 duration-150">

                <div class="relative w-full max-w-md">
                    <span
                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
                    <input

            </div>
            <div class="flex items-center gap-4">
                <button
                    class="text-on-surface-variant hover:bg-surface-container-high rounded-full p-2 transition-colors flex items-center justify-center">

                </div>
            </div>
        </header>
        <main class="flex-1 overflow-y-auto flex items-center justify-center p-xl">

                        style="font-variation-settings: 'FILL' 1;">
                        check_circle
                    </span>
                </div>
                <h1 class="font-headline-lg text-headline-lg text-on-surface mb-xl">
                    Document saved

                <div class="flex flex-col w-full gap-md sm:flex-row">
                    <button
                        class="flex-1 py-3 px-6 rounded-lg font-label-md text-label-md text-on-surface bg-transparent hover:bg-surface-variant transition-colors duration-200">
                        Go to folder
